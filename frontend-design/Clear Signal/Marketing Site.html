/* ── router ── */
const App = () => {
  const [page, setPage] = useState('home');
  const nav = (p) => { setPage(p); window.scrollTo({ top:0, behavior:'instant' }); };
  if (page === 'pricing') return <PricingPage onNav={nav} />;
  if (page === 'report')  return <SampleReportPage onNav={nav} />;
  return <LandingPage onNav={nav} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
